<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Resolving link…</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #15202b;
                color: #e7e9ea;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
            }

            .container {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 28px;
                padding: 32px;
            }

            .spinner {
                width: 48px;
                height: 48px;
                border: 4px solid #1e2d3d;
                border-top-color: #1d9bf0;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .text {
                text-align: center;
            }

            .text h1 {
                font-size: 18px;
                font-weight: 600;
                margin-bottom: 8px;
            }

            .text p {
                font-size: 14px;
                color: #8b98a5;
                line-height: 1.5;
            }

            .url {
                margin-top: 4px;
                font-size: 13px;
                color: #1d9bf0;
                word-break: break-all;
                max-width: 500px;
            }

            .error-container {
                display: none;
                text-align: center;
            }

            .error-container p {
                font-size: 14px;
                color: #f4212e;
                margin-bottom: 12px;
                line-height: 1.5;
            }

            .error-container a {
                display: inline-block;
                padding: 8px 20px;
                background: #1d9bf0;
                color: #fff;
                border-radius: 9999px;
                text-decoration: none;
                font-size: 14px;
                font-weight: 600;
                transition: background 0.15s;
            }

            .error-container a:hover {
                background: #1a8cd8;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="spinner" id="spinner"></div>
            <div class="text">
                <h1>Resolving link…</h1>
                <p>Expanding shortened URL, just a moment.</p>
                <div class="url" id="original-url"></div>
            </div>
            <div class="error-container" id="error-container">
                <p id="error-message">Could not resolve this link.</p>
                <a id="fallback-link" href="#">Open with expandurl.net</a>
            </div>
        </div>

        <script src="loading.js"></script>
    </body>
</html>
