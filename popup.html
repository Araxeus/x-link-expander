<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            body {
                width: 300px;
                padding: 16px;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                color: #e7e9ea;
                background: #15202b;
                margin: 0;
            }
            h1 {
                font-size: 16px;
                margin: 0 0 12px 0;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            h1 img {
                width: 24px;
                height: 24px;
            }
            p {
                font-size: 13px;
                line-height: 1.5;
                margin: 0 0 12px 0;
                color: #8b98a5;
            }
            .status {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 12px;
                background: #1e2d3d;
                border-radius: 8px;
                font-size: 13px;
            }
            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #00ba7c;
                flex-shrink: 0;
            }
            .stats {
                margin-top: 12px;
                font-size: 12px;
                color: #8b98a5;
            }
        </style>
    </head>
    <body>
        <h1>
            <img src="icons/icon48.png" alt="" />
            X Link Expander
        </h1>
        <p>
            Automatically redirects <strong>t.co</strong> shortened links
            through <strong>expandurl.net</strong> so they resolve even when
            t.co is blocked on your network.
        </p>
        <div class="status">
            <div class="status-dot"></div>
            <span>Active &mdash; intercepting t.co links</span>
        </div>
        <div class="stats" id="stats"></div>
        <script src="popup.js"></script>
    </body>
</html>
